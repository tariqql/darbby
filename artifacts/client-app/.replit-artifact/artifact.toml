kind = "web"
previewPath = "/client/"
title = "Darbby — تطبيق المسافر"
version = "1.0.0"
id = "artifacts/client-app"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/client/" ]
localPort = 21647

[services.development]
run = "pnpm --filter @workspace/client-app run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/client-app", "run", "build" ]
publicDir = "artifacts/client-app/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21647"
BASE_PATH = "/client/"
