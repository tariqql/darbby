kind = "web"
previewPath = "/merchant-portal/"
title = "Darbby — بوابة التاجر"
version = "1.0.0"
id = "artifacts/merchant-portal"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/merchant-portal/" ]
localPort = 21804

[services.development]
run = "pnpm --filter @workspace/merchant-portal run dev"

[services.production]
publicDir = "artifacts/merchant-portal/dist/public"
serve = "static"

[services.production.build]
args = ["pnpm", "--filter", "@workspace/merchant-portal", "run", "build"]

[services.production.build.env]
NODE_ENV = "production"
BASE_PATH = "/"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21804"
BASE_PATH = "/merchant-portal/"
